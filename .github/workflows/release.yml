name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build multi-platform binaries
        run: |
          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.get_version.outputs.VERSION }}" \
            -o dist/prom2sar-linux-amd64 \
            cmd/prom2sar/main.go

          # Linux AMD64 (static)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.get_version.outputs.VERSION }} -extldflags '-static'" \
            -o dist/prom2sar-linux-amd64-static \
            cmd/prom2sar/main.go

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.version=${{ steps.get_version.outputs.VERSION }}" \
            -o dist/prom2sar-linux-arm64 \
            cmd/prom2sar/main.go

          # Create checksums
          cd dist
          sha256sum prom2sar-* > checksums.txt
          cd ..

      - name: Create release archive
        run: |
          mkdir -p release

          # Create tarball with binary and docs
          tar -czf release/prom2sar-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz \
            dist/prom2sar-linux-amd64 \
            CLI_README.md \
            CLI_GUIDE.md \
            QUICK_REFERENCE.md \
            LICENSE

          tar -czf release/prom2sar-${{ steps.get_version.outputs.VERSION }}-linux-arm64.tar.gz \
            dist/prom2sar-linux-arm64 \
            CLI_README.md \
            CLI_GUIDE.md \
            QUICK_REFERENCE.md \
            LICENSE

          # Copy static binary separately
          cp dist/prom2sar-linux-amd64-static release/

          # Copy checksums
          cp dist/checksums.txt release/

      - name: Generate release notes
        id: release_notes
        run: |
          # Extract version section from CHANGELOG
          sed -n "/## \[${{ steps.get_version.outputs.VERSION }}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md

          # Add quick start info
          cat >> release_notes.md <<EOF

          ## Quick Start

          Download the binary for your platform, extract it, and run:

          \`\`\`bash
          # Extract
          tar -xzf prom2sar-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz

          # Run
          ./prom2sar-linux-amd64 -tsdb /prometheus -output ./sar-analysis
          \`\`\`

          Or use the static binary (no dependencies):

          \`\`\`bash
          chmod +x prom2sar-linux-amd64-static
          ./prom2sar-linux-amd64-static -tsdb /prometheus
          \`\`\`

          ## Installation

          \`\`\`bash
          sudo cp prom2sar-linux-amd64 /usr/local/bin/prom2sar
          sudo chmod +x /usr/local/bin/prom2sar
          prom2sar --version
          \`\`\`

          See [CLI_GUIDE.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CLI_GUIDE.md) for complete documentation.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/prom2sar-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz
            release/prom2sar-${{ steps.get_version.outputs.VERSION }}-linux-arm64.tar.gz
            release/prom2sar-linux-amd64-static
            release/checksums.txt
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/prometheus-dump-operator:${{ steps.get_version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/prometheus-dump-operator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
